name: Bazel RBE

on:
  pull_request:
    paths:
      - .bazelignore
      - .bazelrc
      - .bazelversion
      - .github/actionlint.yaml
      - .github/workflows/bazel-rbe.yml
      - BUILD.bazel
      - MODULE.bazel
      - MODULE.bazel.lock
      - bazel/**
      - "**/*.go"
      - go.mod
      - go.sum
      - Makefile
      - scripts/run-bazel-rbe.sh
      - internal/firewall/ui/assets/**
  push:
    branches:
      - main
    paths:
      - .bazelignore
      - .bazelrc
      - .bazelversion
      - .github/actionlint.yaml
      - .github/workflows/bazel-rbe.yml
      - BUILD.bazel
      - MODULE.bazel
      - MODULE.bazel.lock
      - bazel/**
      - "**/*.go"
      - go.mod
      - go.sum
      - Makefile
      - scripts/run-bazel-rbe.sh
      - internal/firewall/ui/assets/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || vars.BAZEL_RBE_ENABLED == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
      - evalops-mcp-firewall-rbe
    timeout-minutes: 20
    env:
      BAZEL_RBE_USE_EXISTING_TUNNEL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Bazel tools
        env:
          BAZELISK_VERSION: v1.25.0
          BUILDIFIER_VERSION: v0.0.0-20260319080235-05d2ebe49b0f
          GOFLAGS: -mod=mod
        run: |
          go install github.com/bazelbuild/bazelisk@${BAZELISK_VERSION}
          go install github.com/bazelbuild/buildtools/buildifier@${BUILDIFIER_VERSION}

      - name: Verify generated Bazel graph
        run: make bazel-check

      - name: Run Buildfarm smoke tests
        run: make bazel-rbe-smoke
