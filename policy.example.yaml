# Example MCP firewall policy.
# Use glob patterns; deny rules take precedence over allow rules.

methods:
  allow: []
  deny: []
  strict: false
  case_insensitive: false

tools:
  allow:
    - "cli.*"
    - "shell.*"
  deny:
    - "email.*"
    - "web.*"
    - "github.*"
  strict: false
  case_insensitive: false

resources:
  allow_schemes:
    - "file"
    - "local"
  deny_schemes:
    - "http"
    - "https"
    - "smtp"
    - "imap"
    - "s3"
  strict: false
  case_insensitive: false
  normalize: true

prompts:
  allow: []
  deny: []
  strict: false
  case_insensitive: false

metadata:
  tools: 0
  resources: 0
  prompts: 0
  schemes: []
  generated_at: ""
  note: "Allow lists empty => default allow unless strict=true. Patterns are case-sensitive unless case_insensitive=true."
